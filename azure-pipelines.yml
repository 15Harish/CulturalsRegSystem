trigger:
- main

pool:
  name: 'new pool'   # your self-hosted agent pool name

steps:
- task: Maven@3
  displayName: 'Build and Test with Maven'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    options: '-Xmx3072m'
    publishJUnitResults: true
    testResultsFiles: '**/surefire-reports/TEST-*.xml'
    javaHomeOption: 'Path'   # safer for self-hosted agents
    jdkDirectory: 'C:\Program Files\Java\jdk-11'  # update to your actual JDK path
