trigger:
- main

pool:
  name: 'new pool'   # your agent pool name

steps:
- script: echo "Starting Build..."
  displayName: 'Start Message'

- task: Maven@3
  displayName: 'Maven Build'
  inputs:
    mavenPomFile: 'pom.xml'
    goals: 'clean package'
    publishJUnitResults: false

- script: echo "Build Completed!"
  displayName: 'End Message'
