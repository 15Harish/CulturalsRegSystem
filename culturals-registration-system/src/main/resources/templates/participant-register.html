<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Participant Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100">
    <nav class="bg-purple-600 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-white text-xl font-bold">College Culturals</a>
            <a href="/participant/login" class="text-white">Already have an account? Login</a>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
            <h2 class="text-3xl font-bold text-center text-purple-600 mb-8">Participant Registration</h2>
            
            <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <span th:text="${error}"></span>
            </div>
            
            <form th:action="@{/participant/register}" th:object="${participant}" method="post">
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Name</label>
                    <input type="text" th:field="*{name}" required 
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-purple-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Department</label>
                    <select th:field="*{department}" required 
                            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-purple-500">
                        <option value="">Select Department</option>
                        <option value="CSE">Computer Science</option>
                        <option value="ECE">Electronics</option>
                        <option value="MECH">Mechanical</option>
                        <option value="CIVIL">Civil</option>
                        <option value="IT">Information Technology</option>
                        <option value="EEE">Electrical</option>
                    </select>
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Roll Number</label>
                    <input type="text" th:field="*{rollNumber}" required 
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-purple-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Email</label>
                    <input type="email" th:field="*{email}" required 
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-purple-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Phone Number</label>
                    <input type="tel" th:field="*{phoneNumber}" required 
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-purple-500">
                </div>
                
                <div class="mb-4">
                    <label class="block text-gray-700 font-bold mb-2">Gender</label>
                    <select th:field="*{gender}" required 
                            class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-purple-500">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                
                <div class="mb-6">
                    <label class="block text-gray-700 font-bold mb-2">Password</label>
                    <input type="password" th:field="*{password}" required 
                           class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:border-purple-500">
                </div>
                
                <button type="submit" 
                        class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg hover:bg-purple-700 transition duration-300">
                    Register
                </button>
            </form>
        </div>
    </div>
</body>
</html>
